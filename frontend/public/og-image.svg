<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <style>
      @font-face {
        font-family: 'GeistEmbedded';
        font-style: normal;
        font-weight: 400;
        src: url(data:font/woff2;base64,
      ) format('woff2');
      }
      .brand {
        font-family: 'GeistEmbedded', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 22px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        fill: #7dd3fc;
      }
      .title {
        font-family: 'GeistEmbedded', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 128px;
        font-weight: 700;
        letter-spacing: -0.07em;
        fill: #f8fafc;
      }
      .body {
        font-family: 'GeistEmbedded', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 34px;
        fill: #cbd5e1;
      }
      .meta {
        font-family: 'GeistEmbedded', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 18px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        fill: #94a3b8;
      }
      .domain {
        font-family: 'GeistEmbedded', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 18px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        fill: #60a5fa;
      }
    </style>
    <radialGradient id="bloom" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(420 315) scale(720 252)">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0f"/>
  <rect width="1200" height="630" fill="url(#bloom)"/>

  <g transform="translate(74 54)">
    <svg width="34" height="34" viewBox="0 0 32 32" fill="none">
      <rect x="8" y="18" width="16" height="4" fill="#2563EB"/>
      <rect x="10" y="14" width="12" height="4" fill="#2563EB"/>
      <rect x="12" y="10" width="8" height="4" fill="#2563EB"/>
      <path d="M22 12 L28 8 L26 14 Z" fill="#38BDF8"/>
      <path d="M10 12 L4 8 L6 14 Z" fill="#38BDF8"/>
      <rect x="10" y="22" width="4" height="8" fill="#1A1F2E"/>
      <rect x="18" y="22" width="4" height="8" fill="#1A1F2E"/>
    </svg>
    <text x="54" y="24" class="brand">Hermes</text>
  </g>

  <g transform="translate(74 248)">
    <text x="0" y="0" class="title">HERMES</text>
    <text x="0" y="76" class="body">Real-time quiz sessions. Live analytics.</text>
    <text x="0" y="118" class="body">Anonymous participants.</text>
    <rect x="0" y="154" width="96" height="2" fill="#2563EB"/>
  </g>

  <g transform="translate(74 548)">
    <text x="0" y="0" class="meta">Real-time • WebSocket • Anonymous Participants</text>
    <text x="759" y="0" class="domain">hermes.hishaam.dev</text>
